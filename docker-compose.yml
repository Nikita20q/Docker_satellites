version: '3.8'

services:
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    image: my-satellite-server:${IMAGE_TAG:-latest}
    container_name: server
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/satellite_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9093
    ports:
      - "8080:8080"
    networks:
      - space-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/satellites" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_DB=satellite_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    networks:
      - space-net
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d satellite_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker, controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094,EXTERNAL://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,EXTERNAL://localhost:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9093:9093"
      - "29093:29093"
    volumes:
      - ./data/kafka:/tmp/kraft-combined-logs
    networks:
      - space-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
    depends_on:
      - kafka
    networks:
      - space-net

  mission-service:
    build:
      context: ./Scheduler
      dockerfile: Dockerfile
    image: my-scheduler-client:${IMAGE_TAG:-latest}
    container_name: mission-service
    environment:
      - MY_API_TOKEN=${MY_API_TOKEN}
      - SERVER_PORT=8081
      - SERVER_URL=http://server:8080
    ports:
      - "8081:8081"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - space-net

  telemetry-service:
    build: ./telemetry-service
    container_name: telemetry-service
    ports:
      - "8082:8082"
      - "9091:9091"
    networks:
      - space-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9091"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
networks:
  space-net:
    driver: bridge
volumes:
  pgdata: