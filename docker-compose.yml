version: '3.8'

services:
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: server
    environment:
      - SERVER_PORT=8080
    ports:
      - "8080:8080"
    networks:
      - space-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/overview" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  mission-service:
    build:
      context: ./Scheduler
      dockerfile: Dockerfile
    container_name: mission-service
    environment:
      - SERVER_PORT=8081
      - SERVER_URL=http://server:8080
    ports:
      - "8081:8081"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - space-network

networks:
  space-network:
    driver: bridge
