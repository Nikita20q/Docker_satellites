version: '3.8'

services:
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    image: my-satellite-server:${IMAGE_TAG:-latest}
    container_name: server
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/satellite_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    ports:
      - "8080:8080"
    networks:
      - space-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/satellites" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_DB=satellite_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    networks:
      - space-network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d satellite_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mission-service:
    build:
      context: ./Scheduler
      dockerfile: Dockerfile
    image: my-scheduler-client:${IMAGE_TAG:-latest}
    container_name: mission-service
    environment:
      - MY_API_TOKEN=${MY_API_TOKEN}
      - SERVER_PORT=8081
      - SERVER_URL=http://server:8080
    ports:
      - "8081:8081"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - space-network

networks:
  space-network:
    driver: bridge
volumes:
  pgdata: